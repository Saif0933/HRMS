<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>factoHR - Enterprise HRMS</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      // Intercept and silence Google Maps telemetry/CSP test requests to prevent Brave/Adblocker console errors
      (function() {
        var imgDescriptor = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
        if (imgDescriptor && imgDescriptor.set) {
          var originalSetSrc = imgDescriptor.set;
          Object.defineProperty(HTMLImageElement.prototype, 'src', {
            set: function(val) {
              if (typeof val === 'string' && val.indexOf('gen_204') !== -1) {
                return;
              }
              originalSetSrc.call(this, val);
            },
            get: function() {
              return imgDescriptor.get.call(this);
            }
          });
        }
        var originalFetch = window.fetch;
        if (originalFetch) {
          window.fetch = function(input, init) {
            var url = typeof input === 'string' ? input : (input && input.url);
            if (url && url.indexOf('gen_204') !== -1) {
              return Promise.resolve(new Response(null, { status: 204 }));
            }
            return originalFetch.apply(this, arguments);
          };
        }
        var originalOpen = XMLHttpRequest.prototype.open;
        if (originalOpen) {
          XMLHttpRequest.prototype.open = function(method, url) {
            if (typeof url === 'string' && url.indexOf('gen_204') !== -1) {
              Object.defineProperty(this, 'status', { writable: true, value: 204 });
              Object.defineProperty(this, 'readyState', { writable: true, value: 4 });
              this.send = function() {
                if (this.onreadystatechange) this.onreadystatechange();
                if (this.onload) this.onload();
              };
              return;
            }
            return originalOpen.apply(this, arguments);
          };
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
